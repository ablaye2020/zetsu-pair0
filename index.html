<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ZETSU-PAIR | Code WhatsApp</title>
  <style>
    body {
      background: #0a0a0a;
      color: #ff0000;
      font-family: monospace;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }
    .card {
      background: #111;
      border: 1px solid #ff0000;
      border-radius: 20px;
      padding: 30px;
      width: 360px;
      text-align: center;
    }
    input, button {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      background: #000;
      border: 1px solid #ff0000;
      color: #ff0000;
      border-radius: 8px;
    }
    button {
      font-weight: bold;
      cursor: pointer;
    }
    button:hover { background: #200; }
  </style>
</head>
<body>
<div class="card">
  <h2>⚔️ ZETSU‑MD ⚔️</h2>
  <p>Entrez votre numéro WhatsApp</p>
  <input type="text" id="numero" placeholder="+221XXXXXXXXX">
  <button onclick="genererCode()">🔗 GÉNÉRER LE CODE</button>
  <div id="resultat" style="margin-top: 20px; color: #0f0;"></div>
</div>
<script>
  async function genererCode() {
    const numero = document.getElementById('numero').value.trim();
    if (!numero) return alert("Numéro requis");
    const res = await fetch('/api/pair', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ number: numero })
    });
    const data = await res.json();
    if (data.code) {
      document.getElementById('resultat').innerHTML = `<span style="background:#0f0;color:#000;padding:8px;">🔐 CODE : ${data.code}</span>`;
    } else {
      document.getElementById('resultat').innerHTML = `❌ Erreur : ${data.error}`;
    }
  }
</script>
</body>
</html>
